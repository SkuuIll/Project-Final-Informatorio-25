{% extends 'base.html' %}

{% block title %}Confirmar Borrado{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 sm:p-8 mt-10 text-center">
    <div class="bg-red-100 dark:bg-red-900/50 w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4">
        <i data-feather="trash-2" class="w-8 h-8 text-red-600 dark:text-red-400"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2">
        ¿Estás seguro?
    </h1>
    <p class="text-gray-600 dark:text-gray-400 mb-6">
        Estás a punto de eliminar permanentemente el post: <strong class="font-semibold">"{{ object.title }}"</strong>.
    </p>
    <p class="text-gray-600 dark:text-gray-400 mb-8">
        Esta acción no se puede deshacer.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center space-x-4">
            <a href="{% url 'posts:post_detail' object.slug %}" class="bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 px-6 py-3 rounded-md hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors font-semibold">
                Cancelar
            </a>
            <button type="submit" class="bg-red-600 text-white px-6 py-3 rounded-md hover:bg-red-700 transition-colors font-semibold">
                Sí, eliminar
            </button>
        </div>
    </form>
</div>
{% endblock %}
